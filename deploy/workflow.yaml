main:
  params: [args]
  steps:

    - init:
        assign:
          - project: "tbrain-services"
          - region: "asia-southeast1"
          - recheck_all: ${default(map.get(args, "recheck_all"), "")}
          - recheck_fail: ${default(map.get(args, "recheck_fail"), "")}
          - skip_index: ${default(map.get(args, "skip_index"), false)}

    - maybe_run_index:
        switch:
          - condition: ${skip_index == true}
            next: run_batches_1_50
        next: run_index_job

    - run_index_job:
        call: googleapis.run.v1.namespaces.jobs.run
        args:
          name: ${"namespaces/" + project + "/jobs/tbrain-games-qc-index"}
          location: ${region}
          body:
            overrides:
              containerOverrides:
                - env:
                    - name: GCS_BUCKET
                      value: tbrain-qc-cache
        result: index_op

    - check_index_success:
        switch:
          - condition: ${default(map.get(index_op.status, "failedCount"), 0) > 0}
            raise: "Index job failed — check Cloud Run logs before running batch jobs"
        next: run_batches_1_50

    - run_batches_1_50:
        parallel:
          branches:
            - run_batch_a:
                steps:
                  - exec_a:
                      call: googleapis.run.v1.namespaces.jobs.run
                      args:
                        name: ${"namespaces/" + project + "/jobs/tbrain-games-qc-job"}
                        location: ${region}
                        body:
                          overrides:
                            containerOverrides:
                              - env:
                                  - name: BATCH_NUMBERS
                                    value: "1-10"
                                  - name: RECHECK_ALL
                                    value: ${recheck_all}
                                  - name: RECHECK_FAIL
                                    value: ${recheck_fail}
                                  - name: GCS_BUCKET
                                    value: tbrain-qc-cache
                      result: result_a

            - run_batch_b:
                steps:
                  - exec_b:
                      call: googleapis.run.v1.namespaces.jobs.run
                      args:
                        name: ${"namespaces/" + project + "/jobs/tbrain-games-qc-job"}
                        location: ${region}
                        body:
                          overrides:
                            containerOverrides:
                              - env:
                                  - name: BATCH_NUMBERS
                                    value: "11-20"
                                  - name: RECHECK_ALL
                                    value: ${recheck_all}
                                  - name: RECHECK_FAIL
                                    value: ${recheck_fail}
                                  - name: GCS_BUCKET
                                    value: tbrain-qc-cache
